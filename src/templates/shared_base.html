<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Pydantic Forms Demo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"> -->
    <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', path='favicon.png') }}">

    {% block extra_head %}{% endblock %}

    <style>
        :root {
            --demo-primary-color: #4f46e5;
            --demo-secondary-color: #7c3aed;
        }

        body {
            background-color: #f8f9fa;
        }

        .site-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: #111827;
        }

        .site-brand:hover {
            color: #111827;
        }

        .site-brand-logo {
            height: 42px;
            width: auto;
            display: block;
        }

        .site-brand-mark {
            width: 36px;
            height: 36px;
            border-radius: 0.75rem;
            display: none;
        }

        .site-brand-copy {
            line-height: 1.1;
        }

        .site-brand-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin: 0;
        }

        .site-brand-subtitle {
            font-size: 0.8rem;
            color: #6b7280;
            margin: 0;
        }

        .site-brand-shell {
            margin-bottom: 1.5rem;
        }

        @media (max-width: 576px) {
            .site-brand-logo {
                display: none;
            }

            .site-brand-mark {
                display: block;
            }
        }

        .demo-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 0.75rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .form-header,
        .hero-section {
            background: linear-gradient(135deg, var(--demo-primary-color), var(--demo-secondary-color));
            color: #fff;
            padding: 1.5rem;
            border-radius: 0.75rem 0.75rem 0 0;
        }

        .btn-demo {
            background-color: var(--demo-primary-color);
            border-color: var(--demo-primary-color);
            color: #fff;
        }

        .btn-demo:hover {
            background-color: #4338ca;
            border-color: #4338ca;
            color: #fff;
        }

        /*
         * Keep example pages clean when Material icon webfont imports are disabled.
         * Without the font, ligature tokens (e.g., "favorite_border") render as text.
         */
        i.material-icons,
        span.material-icons {
            display: none !important;
        }

        /*
         * Material select alignment fix for example pages:
         * The renderer outputs a floating label immediately after
         * `select.browser-default`. Without the Material webfont/CSS stack,
         * this label overlaps selected text (e.g., Species over Dog 🐕).
         */
        .md-input-wrapper > select.browser-default {
            width: 100%;
        }

        .md-input-wrapper > select.browser-default + .md-floating-label {
            position: static !important;
            display: block;
            transform: none !important;
            background: transparent !important;
            padding: 0 !important;
            margin-top: 0.25rem;
            color: #495057;
            font-size: 0.95rem;
            line-height: 1.2;
            pointer-events: none;
        }
    </style>

    {% block extra_styles %}{% endblock %}
</head>
<body>
    <div class="{% if request and 'organization' in request.path %}container-fluid{% else %}container{% endif %} py-4">
        {% if not request or request.url.path != '/' %}
        <div class="site-brand-shell">
            <a class="site-brand" href="/" aria-label="Pydantic Schemaform home">
                <img class="site-brand-logo" src="{{ url_for('static', path='pydantic-schemaform-logo.png') }}" alt="Pydantic Schemaform logo">
                <img class="site-brand-mark" src="{{ url_for('static', path='favicon.png') }}" alt="Pydantic Schemaform icon">
                <span class="site-brand-copy">
                    <span class="site-brand-title d-block">Pydantic Schemaform</span>
                    <span class="site-brand-subtitle d-block">Pydantic models to polished forms</span>
                </span>
            </a>
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
